services:
  spacebot:
    build:
      context: .
      dockerfile: Dockerfile.custom
    image: spacebot-custom:latest
    container_name: deven-spacebot
    restart: unless-stopped
    ports:
      - "19898:19898"
    environment:
      - PATH=/host-bin:/data/tools/bin:/usr/local/sbin:/usr/local/bin:/usr/sbin:/usr/bin:/sbin:/bin
      - SPACEBOT_CRON_TIMEZONE=America/New_York
      - EMA_VAULT_ROOT=/mnt/c/dev/projects/pscm-dscloud/EMAKBAI
      - AGENT_BROWSER_ENGINE=lightpanda
    volumes:
      - spacebot-data:/data
      - /var/run/docker.sock:/var/run/docker.sock
      - type: bind
        source: ${EMAKBAI_HOST_PATH:-/mnt/c/dev/projects/pscm-dscloud/EMAKBAI}
        target: /mnt/c/dev/projects/pscm-dscloud/EMAKBAI
      # Librarian-Agent identity files from vault
      - type: bind
        source: ${EMAKBAI_HOST_PATH:-/mnt/c/dev/projects/pscm-dscloud/EMAKBAI}/00_Control_Plane/Prompts/librarian-agent/SOUL.md
        target: /data/agents/librarian-agent/SOUL.md
        read_only: true
      - type: bind
        source: ${EMAKBAI_HOST_PATH:-/mnt/c/dev/projects/pscm-dscloud/EMAKBAI}/00_Control_Plane/Prompts/librarian-agent/IDENTITY.md
        target: /data/agents/librarian-agent/IDENTITY.md
        read_only: true
      - type: bind
        source: ${EMAKBAI_HOST_PATH:-/mnt/c/dev/projects/pscm-dscloud/EMAKBAI}/00_Control_Plane/Prompts/librarian-agent/ROLE.md
        target: /data/agents/librarian-agent/ROLE.md
        read_only: true
      - type: bind
        source: ${EMAKBAI_HOST_PATH:-/mnt/c/dev/projects/pscm-dscloud/EMAKBAI}/00_Control_Plane/Prompts/librarian-agent/SKILLS/librarian-heartbeat
        target: /data/agents/librarian-agent/workspace/skills/librarian-heartbeat
        read_only: true
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:19898/api/health"]
      interval: 30s
      timeout: 5s
      retries: 3

volumes:
  spacebot-data:
    external: true

# Helper workflow:
# - deven-spacebot is the custom container on http://localhost:19898
# - It uses the existing external volume: spacebot-data
# - Host vault path is controlled by EMAKBAI_HOST_PATH (set by helper scripts).
# - Build it from local source:
#     ./scripts/spacebot-docker.ps1 custom-up
# - Build it from Dockerfile.custom (remote-base mode):
#     ./scripts/spacebot-docker.ps1 custom-up -Mode remote-base
# - Stop it:
#     ./scripts/spacebot-docker.ps1 custom-down
# - Run both custom and upstream variants together:
#     ./scripts/spacebot-docker.ps1 both-up
# - Show current status:
#     ./scripts/spacebot-docker.ps1 status