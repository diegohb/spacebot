version: '3.8'

services:
  spacebot:
    build:
      context: .
      dockerfile: Dockerfile.custom
    image: spacebot-custom:latest
    container_name: deven-spacebot
    restart: unless-stopped
    ports:
      - "19898:19898"
    environment:
      - PATH=/host-bin:/data/tools/bin:/usr/local/sbin:/usr/local/bin:/usr/sbin:/usr/bin:/sbin:/bin
      - SPACEBOT_CRON_TIMEZONE=America/New_York
      - EMA_VAULT_ROOT=/mnt/c/dev/projects/pscm-dscloud/EMAKBAI
      - AGENT_BROWSER_ENGINE=lightpanda
    volumes:
      - spacebot-data:/data
      - /var/run/docker.sock:/var/run/docker.sock
      - C:/dev/projects/pscm-dscloud/EMAKBAI:/mnt/c/dev/projects/pscm-dscloud/EMAKBAI
      # Librarian-Agent identity files from vault
      - C:/dev/projects/pscm-dscloud/EMAKBAI/00_Control_Plane/Prompts/librarian-agent/SOUL.md:/data/agents/librarian-agent/SOUL.md:ro
      - C:/dev/projects/pscm-dscloud/EMAKBAI/00_Control_Plane/Prompts/librarian-agent/IDENTITY.md:/data/agents/librarian-agent/IDENTITY.md:ro
      - C:/dev/projects/pscm-dscloud/EMAKBAI/00_Control_Plane/Prompts/librarian-agent/ROLE.md:/data/agents/librarian-agent/ROLE.md:ro
      - C:/dev/projects/pscm-dscloud/EMAKBAI/00_Control_Plane/Prompts/librarian-agent/SKILLS/librarian-heartbeat:/data/agents/librarian-agent/workspace/skills/librarian-heartbeat:ro
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:19898/api/health"]
      interval: 30s
      timeout: 5s
      retries: 3

volumes:
  spacebot-data:
    external: true

# How to extend without merge conflicts:

# Default mode uses upstream/remote app image as the base:
# Dockerfile.custom starts from ghcr.io/spacedriveapp/spacebot:latest,
# then adds your fork-local custom layers.

# Default workflow (remote base)
# docker compose build --pull spacebot
# docker compose up -d

# Refresh to newest upstream base and recreate container
# docker pull ghcr.io/spacedriveapp/spacebot:latest
# docker compose build --pull spacebot
# docker compose up -d --force-recreate

# Build from LOCAL source code instead (one-off override)
# docker build -f Dockerfile -t spacebot-custom:latest .
# docker compose up -d --force-recreate

# Notes:
# - docker compose up -d alone may reuse an existing image.
# - Use --build (or docker compose build) when you need new code/layers.